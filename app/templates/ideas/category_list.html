<!doctype html>
<html>
    <head>
        <title>{{ title }}</title>
    </head>
    <body>
        <h1>{{ title }}</h1>
        {% if user.is_superuser %}
        <a href="{% url 'category_create' %}">Створити нову категорію</a>
        {% endif %}
        <a href="{% url 'idea_list' %}">До списку ідей</a>
        <hr />
        <ul>
            {% for category in categories %}
            <li>
                <a href="{% url 'category_detail' category.id %}"
                    >{{ category.name }}</a
                >
            </li>
            {% endfor %}
        </ul>
    </body>
</html>
