<!doctype html>
<html>
    <head>
        <title>{{ title }}</title>
    </head>
    <body>
        <h1>Видалення</h1>
        <p>Видалити категорію "{{ category.name }}"?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Так, видалити</button>
            <a href="{% url 'category_detail' category.id %}">Скасувати</a>
        </form>
    </body>
</html>
